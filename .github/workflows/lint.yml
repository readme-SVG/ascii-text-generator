name: Lint

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Lint HTML, CSS, and JavaScript
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "22" # Align this with the project's supported Node.js runtime if needed.
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install lint tooling
        run: >-
          npm install --no-save
          eslint@9
          @eslint/js@9
          globals@15
          htmlhint@1
          stylelint@16
          stylelint-config-standard@36

      - name: Write temporary ESLint config
        run: |
          cat <<'CONFIG' > eslint.config.mjs
          import js from '@eslint/js';
          import globals from 'globals';

          export default [
            js.configs.recommended,
            {
              files: ['assets/js/**/*.js'],
              languageOptions: {
                ecmaVersion: 'latest',
                sourceType: 'module',
                globals: {
                  ...globals.browser,
                },
              },
              rules: {
                'no-unused-vars': ['error', { argsIgnorePattern: '^_' }],
              },
            },
          ];
          CONFIG

      - name: Write temporary Stylelint config
        run: |
          cat <<'CONFIG' > .stylelintrc.json
          {
            "extends": ["stylelint-config-standard"]
          }
          CONFIG

      - name: Write temporary HTMLHint config
        run: |
          cat <<'CONFIG' > .htmlhintrc
          {
            "tag-pair": true,
            "tagname-lowercase": true,
            "attr-lowercase": true,
            "attr-value-double-quotes": true,
            "doctype-first": false,
            "spec-char-escape": true,
            "id-unique": true,
            "src-not-empty": true,
            "alt-require": false,
            "title-require": false
          }
          CONFIG

      - name: Run ESLint
        run: npx eslint assets/js/**/*.js

      - name: Run Stylelint
        run: npx stylelint assets/css/**/*.css

      - name: Run HTMLHint
        run: npx htmlhint index.html
